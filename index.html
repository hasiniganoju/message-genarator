<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mood Message</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="card">
        <h1>How are you feeling today? 💛</h1>

        <input type="text" id="username" placeholder="Enter your name">

        <div class="mood-container">
            <button class="mood" data-mood="happy">😊</button>
            <button class="mood" data-mood="sad">😔</button>
            <button class="mood" data-mood="angry">😠</button>
            <button class="mood" data-mood="anxious">😰</button>
            <button class="mood" data-mood="tired">😴</button>
        </div>

        <div id="result"></div>
    </div>

<script src="script.js"></script>
</body>
</html>
